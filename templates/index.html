<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像ゆがみ補正 Webアプリ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; touch-action: manipulation; }
        .controls { margin: 15px auto; padding: 10px; background: white; border-radius: 8px; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 95%; }
        .btn-group { margin-top: 10px; }
        canvas { border: 1px solid #ccc; max-width: 100%; cursor: crosshair; background-color: #fff; }
        #result-container { margin-top: 30px; }
        #result-image { max-width: 100%; border: 2px solid #4CAF50; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        button { padding: 8px 12px; margin: 3px; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background-color: #eee; }
        .action-btn { background-color: #4CAF50; color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <h2>📸 画像ゆがみ補正 Webアプリ</h2>
    
    <div class="controls">
        <input type="file" id="imageInput" accept="image/*" style="margin-bottom: 10px;">
        <br>
        <label for="ratioSelect">比率:</label>
        <select id="ratioSelect">
            <option value="7:5">7:5</option>
            <option value="1:1">Square (1:1)</option>
            <option value="16:9">16:9</option>
            <option value="5:7">5:7</option>
            <option value="9:16">9:16</option>
        </select>

        <div class="btn-group">
            <button onclick="undo()">↩ 戻す</button>
            <button onclick="redo()">やり直し ↪</button>
            <button onclick="clearPoints()">クリア</button>
            <button class="action-btn" onclick="processImage()">✨ 補正実行！</button>
        </div>
    </div>

    <p style="font-size: 0.9em;">画像を読み込んで四隅をタップ！<br><b>2本指でズーム、点を長押しで微調整</b>できるよ！</p>

    <div>
        <canvas id="canvas"></canvas>
    </div>

    <div id="result-container" style="display: none;">
        <h3>✨ 補正完了！長押しで保存してね</h3>
        <img id="result-image" src="" alt="補正結果">
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultContainer = document.getElementById('result-container');
        const resultImage = document.getElementById('result-image');
        
        let img = new Image();
        let points = [];
        let scale = 1;
        let draggingIndex = -1;
        const hitRadius = 30; 

        // Undo/Redo用の履歴管理
        let history = [[]];
        let historyStep = 0;

        function saveHistory() {
            // 過去に戻っている状態で新しい操作をしたら、それより先の未来は消す
            history = history.slice(0, historyStep + 1);
            // 現在の点を履歴に追加（ディープコピー）
            history.push(JSON.parse(JSON.stringify(points)));
            historyStep++;
        }

        function undo() {
            if (historyStep > 0) {
                historyStep--;
                points = JSON.parse(JSON.stringify(history[historyStep]));
                draggingIndex = -1;
                drawCanvas();
            }
        }

        function redo() {
            if (historyStep < history.length - 1) {
                historyStep++;
                points = JSON.parse(JSON.stringify(history[historyStep]));
                draggingIndex = -1;
                drawCanvas();
            }
        }

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                img.onload = function() {
                    // 画像読み込み時に初期化
                    points = []; 
                    history = [[]];
                    historyStep = 0;
                    draggingIndex = -1;
                    
                    // ズーム時の違和感をなくすため、キャンバスサイズの計算はここ(1回)だけにする！
                    const maxWidth = window.innerWidth * 0.95;
                    scale = img.width > maxWidth ? maxWidth / img.width : 1;
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    
                    drawCanvas();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        function drawCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            points.forEach((p, index) => {
                ctx.beginPath();
                ctx.arc(p.x * scale, p.y * scale, draggingIndex === index ? 8 : 5, 0, Math.PI * 2);
                ctx.fillStyle = draggingIndex === index ? "orange" : "red";
                ctx.fill();
            });

            if (points.length === 4) {
                ctx.beginPath();
                ctx.moveTo(points[0].x * scale, points[0].y * scale);
                for (let i = 1; i < 4; i++) {
                    ctx.lineTo(points[i].x * scale, points[i].y * scale);
                }
                ctx.closePath();
                ctx.strokeStyle = "lime";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        function getPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const canvasX = (clientX - rect.left) * (canvas.width / rect.width);
            const canvasY = (clientY - rect.top) * (canvas.height / rect.height);
            return { x: canvasX / scale, y: canvasY / scale };
        }

        // --- マウス操作 ---
        canvas.addEventListener('mousedown', function(e) {
            if (!img.src) return;
            const pos = getPos(e.clientX, e.clientY);
            
            draggingIndex = points.findIndex(p => Math.hypot(p.x - pos.x, p.y - pos.y) * scale < hitRadius);
            
            if (draggingIndex === -1 && points.length < 4) {
                points.push({x: pos.x, y: pos.y});
                saveHistory(); // 点を追加した時に履歴を保存
            }
            drawCanvas();
        });

        canvas.addEventListener('mousemove', function(e) {
            if (draggingIndex !== -1) {
                const pos = getPos(e.clientX, e.clientY);
                points[draggingIndex] = {x: pos.x, y: pos.y};
                drawCanvas();
            }
        });

        canvas.addEventListener('mouseup', function() {
            if (draggingIndex !== -1) {
                saveHistory(); // ドラッグが終わった時に履歴を保存
                draggingIndex = -1;
                drawCanvas(); // 色を元に戻すために再描画
            }
        });
        
        canvas.addEventListener('mouseleave', function() {
            if (draggingIndex !== -1) {
                saveHistory();
                draggingIndex = -1;
                drawCanvas();
            }
        });

        // --- タッチ操作 ---
        canvas.addEventListener('touchstart', function(e) {
            if (!img.src || e.touches.length >= 2) return; 
            
            e.preventDefault(); 
            const touch = e.touches[0];
            const pos = getPos(touch.clientX, touch.clientY);
            
            draggingIndex = points.findIndex(p => Math.hypot(p.x - pos.x, p.y - pos.y) * scale < hitRadius);
            
            if (draggingIndex === -1 && points.length < 4) {
                points.push({x: pos.x, y: pos.y});
                saveHistory(); // 点を追加した時に履歴を保存
            }
            drawCanvas();
        }, {passive: false});

        canvas.addEventListener('touchmove', function(e) {
            if (e.touches.length >= 2) return; 
            if (draggingIndex !== -1) {
                e.preventDefault();
                const touch = e.touches[0];
                const pos = getPos(touch.clientX, touch.clientY);
                points[draggingIndex] = {x: pos.x, y: pos.y};
                drawCanvas();
            }
        }, {passive: false});

        canvas.addEventListener('touchend', function() {
            if (draggingIndex !== -1) {
                saveHistory(); // ドラッグが終わった時に履歴を保存
                draggingIndex = -1;
                drawCanvas(); // 色を元に戻すために再描画
            }
        });

        function clearPoints() {
            points = [];
            draggingIndex = -1;
            saveHistory();
            drawCanvas();
        }

        async function processImage() {
            if (points.length !== 4) {
                alert("四隅を4つタップしてね！");
                return;
            }
            const file = imageInput.files[0];
            const ratioVal = document.getElementById('ratioSelect').value.split(':');
            const ratio_w = parseFloat(ratioVal[0]);
            const ratio_h = parseFloat(ratioVal[1]);
            const cvPoints = points.map(p => [p.x, p.y]);

            const formData = new FormData();
            formData.append('image', file);
            formData.append('points', JSON.stringify(cvPoints));
            formData.append('ratio_w', ratio_w);
            formData.append('ratio_h', ratio_h);

            try {
                const response = await fetch('/process', { method: 'POST', body: formData });
                const result = await response.json();
                if (result.success) {
                    resultImage.src = "data:image/jpeg;base64," + result.image;
                    resultContainer.style.display = "block";
                    resultContainer.scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("エラーが発生しました: " + result.error);
                }
            } catch (error) {
                alert("通信エラーが発生しました！");
            }
        }
    </script>
</body>
</html>
