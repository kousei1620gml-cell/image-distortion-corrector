<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>画像ゆがみ補正 Webアプリ</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; touch-action: manipulation; }
        .controls { margin: 20px; padding: 15px; background: white; border-radius: 8px; display: inline-block; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        /* canvasのtouch-actionをnoneにしないことで、ピンチズームを許可します */
        canvas { border: 1px solid #ccc; max-width: 100%; cursor: crosshair; background-color: #fff; }
        #result-container { margin-top: 30px; }
        #result-image { max-width: 100%; border: 2px solid #4CAF50; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        button { padding: 8px 16px; margin: 0 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>📸 画像ゆがみ補正 Webアプリ</h2>
    
    <div class="controls">
        <input type="file" id="imageInput" accept="image/*">
        
        <label for="ratioSelect">比率:</label>
        <select id="ratioSelect">
            <option value="7:5">7:5</option>
            <option value="1:1">Square (1:1)</option>
            <option value="16:9">16:9</option>
            <option value="5:7">5:7</option>
            <option value="9:16">9:16</option>
        </select>

        <button onclick="clearPoints()">ポイントクリア</button>
        <button onclick="processImage()" style="background-color: #4CAF50; color: white; border: none;">補正実行！</button>
    </div>

    <p>画像を読み込んで四隅をタップ！<br>✨ <b>2本指でズーム、点を長押しで微調整（ドラッグ）</b>もできるよ！</p>

    <div>
        <canvas id="canvas"></canvas>
    </div>

    <div id="result-container" style="display: none;">
        <h3>✨ 補正完了！長押し(右クリック)で保存してね</h3>
        <img id="result-image" src="" alt="補正結果">
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultContainer = document.getElementById('result-container');
        const resultImage = document.getElementById('result-image');
        
        let img = new Image();
        let points = [];
        let scale = 1;
        
        // ドラッグ（微調整）用の変数
        let draggingIndex = -1;
        // 点を掴む判定の広さ（スマホの指でも掴みやすいように大きめに設定）
        const hitRadius = 30; 

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                img.onload = function() {
                    points = []; 
                    drawCanvas();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        function drawCanvas() {
            const maxWidth = window.innerWidth * 0.95;
            scale = img.width > maxWidth ? maxWidth / img.width : 1;
            
            canvas.width = img.width * scale;
            canvas.height = img.height * scale;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

            // 点を描画
            points.forEach((p, index) => {
                ctx.beginPath();
                ctx.arc(p.x * scale, p.y * scale, draggingIndex === index ? 8 : 5, 0, Math.PI * 2);
                ctx.fillStyle = draggingIndex === index ? "orange" : "red"; // 掴んでいる点はオレンジに
                ctx.fill();
            });

            // 4点揃ったら緑の線を引く
            if (points.length === 4) {
                ctx.beginPath();
                ctx.moveTo(points[0].x * scale, points[0].y * scale);
                for (let i = 1; i < 4; i++) {
                    ctx.lineTo(points[i].x * scale, points[i].y * scale);
                }
                ctx.closePath();
                ctx.strokeStyle = "lime";
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // 画面のタップ座標を、画像内の正確な座標に変換する関数（ズーム時も対応）
        function getPos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const canvasX = (clientX - rect.left) * (canvas.width / rect.width);
            const canvasY = (clientY - rect.top) * (canvas.height / rect.height);
            return { x: canvasX / scale, y: canvasY / scale };
        }

        // --- PCのオプティマイズ（マウス操作） ---
        canvas.addEventListener('mousedown', function(e) {
            if (!img.src) return;
            const pos = getPos(e.clientX, e.clientY);
            
            // 既存の点の近くをクリックしたかチェック（ドラッグ開始）
            draggingIndex = points.findIndex(p => Math.hypot(p.x - pos.x, p.y - pos.y) * scale < hitRadius);
            
            // 近くに点がなく、まだ4点未満なら新規追加
            if (draggingIndex === -1 && points.length < 4) {
                points.push({x: pos.x, y: pos.y});
            }
            drawCanvas();
        });

        canvas.addEventListener('mousemove', function(e) {
            if (draggingIndex !== -1) {
                const pos = getPos(e.clientX, e.clientY);
                points[draggingIndex] = {x: pos.x, y: pos.y};
                drawCanvas();
            }
        });

        canvas.addEventListener('mouseup', () => draggingIndex = -1);
        canvas.addEventListener('mouseleave', () => draggingIndex = -1);


        // --- スマホのオプティマイズ（タッチ操作） ---
        canvas.addEventListener('touchstart', function(e) {
            if (!img.src || e.touches.length >= 2) return; // 2本指以上の時はズームに任せる
            
            e.preventDefault(); // 1本指の時は画面スクロールを止める
            const touch = e.touches[0];
            const pos = getPos(touch.clientX, touch.clientY);
            
            // 既存の点の近くをタップしたかチェック
            draggingIndex = points.findIndex(p => Math.hypot(p.x - pos.x, p.y - pos.y) * scale < hitRadius);
            
            if (draggingIndex === -1 && points.length < 4) {
                points.push({x: pos.x, y: pos.y});
            }
            drawCanvas();
        }, {passive: false});

        canvas.addEventListener('touchmove', function(e) {
            if (e.touches.length >= 2) return; // ズーム中は点は動かさない
            if (draggingIndex !== -1) {
                e.preventDefault();
                const touch = e.touches[0];
                const pos = getPos(touch.clientX, touch.clientY);
                points[draggingIndex] = {x: pos.x, y: pos.y};
                drawCanvas();
            }
        }, {passive: false});

        canvas.addEventListener('touchend', () => draggingIndex = -1);

        function clearPoints() {
            points = [];
            draggingIndex = -1;
            drawCanvas();
        }

        async function processImage() {
            if (points.length !== 4) {
                alert("四隅を4つタップしてね！");
                return;
            }
            const file = imageInput.files[0];
            const ratioVal = document.getElementById('ratioSelect').value.split(':');
            const ratio_w = parseFloat(ratioVal[0]);
            const ratio_h = parseFloat(ratioVal[1]);
            const cvPoints = points.map(p => [p.x, p.y]);

            const formData = new FormData();
            formData.append('image', file);
            formData.append('points', JSON.stringify(cvPoints));
            formData.append('ratio_w', ratio_w);
            formData.append('ratio_h', ratio_h);

            try {
                const response = await fetch('/process', { method: 'POST', body: formData });
                const result = await response.json();
                if (result.success) {
                    resultImage.src = "data:image/jpeg;base64," + result.image;
                    resultContainer.style.display = "block";
                    resultContainer.scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("エラーが発生しました: " + result.error);
                }
            } catch (error) {
                alert("通信エラーが発生しました！");
            }
        }
    </script>
</body>
</html>
